---
- name: Run RedHat preparation
  ansible.builtin.include_tasks: setup-RedHat.yml
  when: ansible_facts["os_family"] == 'RedHat'

- name: Run Debian preparation
  ansible.builtin.include_tasks: setup-Debian.yml
  when: ansible_facts["os_family"] == 'Debian'

- name: Install Docker.
  ansible.builtin.apt:
    name:
      - "docker-ce={{ docker_version }}"
      - "docker-ce-cli={{ docker_version }}"
      - containerd.io
      - docker-buildx-plugin
      - "docker-compose-plugin={{ docker_compose_version }}"
    state: present

- name: Copy docker daemon config file
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/etc/docker/"
  with_items:
    - "daemon.json"
  notify: Restart docker

- name: Ensure Docker is started and enabled at boot.
  ansible.builtin.service:
    name: docker
    state: "{{ docker_service_state }}"
    enabled: "{{ docker_service_enabled }}"

- name: Create unix groups for docker users
  ansible.builtin.group:
    name: "{{ item.group }}"
    gid: "{{ item.gid }}"
  loop: "{{ docker_users }}"

- name: Create unix users for use in docker images
  ansible.builtin.user:
    name: "{{ item.name }}"
    group: "{{ item.group }}"
    groups:
      - "docker"
    uid: "{{ item.uid }}"
    append: false
    system: true
  loop: "{{ docker_users }}"

- name: Create cleanup cronjob
  ansible.builtin.cron:
    minute: "00"
    hour: "1"
    weekday: "*"
    name: "Docker system cleanup"
    user: "root"
    job: "docker system prune -f"

- name: Copy ufw bash file
  ansible.builtin.copy:
    src: "ufw-docker"
    dest: "/usr/local/bin/"
    mode: a+x
  register: docker_ufw_docker_copy

- name: Install ufw-docker
  ansible.builtin.command: "{{ docker_ufw_docker_copy.dest }} install"
  notify: Restart ufw
